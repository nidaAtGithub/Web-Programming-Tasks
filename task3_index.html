<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login System</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="task3_style.css"/>
</head>
<body>

<div class="bg-blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>

<div class="container">
  <div class="logo">
    <div class="logo-icon"></div>
    <h1>SecureAuth</h1>
    <p>Task 3 — Login System</p>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" onclick="switchTab('login')">Login</button>
    <button class="tab" onclick="switchTab('register')">Register</button>
  </div>

  <div class="card">

    <!-- LOGIN -->
    <div class="panel active" id="loginPanel">
      <div class="panel-title">Welcome back</div>
      <div class="panel-sub">Sign in to your account</div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="loginUsername" placeholder="Enter your username"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password"/>
      </div>
      <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">Sign In</button>
    </div>

    <!-- REGISTER -->
    <div class="panel" id="registerPanel">
      <div class="panel-title">Create account</div>
      <div class="panel-sub">Join and get started</div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="regUsername" placeholder="Choose a username"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Choose a password"/>
      </div>
      <button class="btn btn-primary" id="registerBtn" onclick="handleRegister()">Create Account</button>
    </div>

    <!-- DASHBOARD -->
    <div class="panel" id="dashboardPanel">
      <div class="welcome">
        <div class="avatar">&#128100;</div>
        <div class="welcome-name" id="welcomeName">Hello!</div>
        <div class="welcome-sub">You are successfully logged in</div>
      </div>
      <div class="stats">
        <div class="stat-card">
          <div class="stat-num">✓</div>
          <div class="stat-label">Authenticated</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">🔒</div>
          <div class="stat-label">Session Active</div>
        </div>
      </div>
      <button class="btn btn-outline" onclick="handleLogout()">Sign Out</button>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toastMsg"></span>
</div>

<script src="task3_script.js"></script>
</body>
</html>
